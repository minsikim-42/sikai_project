<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My AI Server</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- 헤더 -->
    <div class="header">
        🤖 My AI Server
    </div>

    <!-- 채팅 영역 -->
    <div id="chatBox" class="chat-box">
        <div class="message ai">안녕하세요! 무엇을 도와드릴까요?</div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area">
        <input id="input" />
        <button onclick="sendMessage()">➤</button>

    </div>

    <div class="settings-area">
        <div class="setting-item">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
                <option value="qwen3:0.6b" selected>qwen3:0.6b(장난감) (default)</option>
                <option value="qwen3:8b">qwen3:8b</option>
                <option value="qwen3:14b">qwen3:14b(말이 좀 되기시작)</option>
                <option value="qwen3.6:35b-mlx">qwen3.6:35b-mlx(잘함)</option>
                <option value="test_error">test_error</option>
            </select>
        </div>

        <div class="setting-item">
            <label for="contextSelect">Context</label>
            <select id="contextSelect">
                <option value="1024">1K</option>
                <option value="2048" selected>2K</option>
                <option value="8192">8K</option>
                <option value="32768">32K</option>
                <option value="65536">64K (느림)</option>
            </select>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>

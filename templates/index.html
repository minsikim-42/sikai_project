<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Server</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

.container{
    text-align:center;
    background:white;
    padding:60px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    min-width:420px;
}

h1{
    color:#2563eb;
    margin-bottom:20px;
}

p{
    color:#555;
    margin-bottom:40px;
    line-height:1.6;
}

a{
    display:inline-block;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:14px 32px;
    border-radius:10px;
    font-size:18px;
    transition:.2s;
}

a:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Server</h1>

    <p>
        안녕하세요.<br>
        AI 채팅 서버에 오신 것을 환영합니다.
    </p>

    <a href="/chat">채팅 시작하기</a>
</div>

</body>
</html>
